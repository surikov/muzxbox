<html>
<button onclick='start();'>beep AHDSR</button>
<script>
    function start() {
        let audioContext = new AudioContext();
        let when = audioContext.currentTime + 0.1;

        let envelope = audioContext.createGain();
        let beep = audioContext.createOscillator();

        beep.frequency.value = 440;

        envelope.gain.setValueAtTime(0, when);
        envelope.gain.linearRampToValueAtTime(1, when + 0.05);
        envelope.gain.linearRampToValueAtTime(0.5, when + 0.2);
        envelope.gain.setValueAtTime(0.5, when + 0.99);
        envelope.gain.linearRampToValueAtTime(0, when + 1);

        envelope.connect(audioContext.destination);
        beep.connect(envelope);

        beep.start(when);
        beep.stop(when + 1);
    }
</script>

</html>

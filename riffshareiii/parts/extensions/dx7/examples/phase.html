<html>
<button onclick='start();'>phase modulation</button>
<script>
	function start() {
		let audioContext = new AudioContext();
		let when = audioContext.currentTime + 0.1;
		let carierFrequency = 440;

		let carrier = audioContext.createOscillator();
		let modulatorBeep = audioContext.createOscillator();
		let modulationLevel = audioContext.createGain();
		let phaseDelay = audioContext.createDelay();

		carrier.frequency.value = carierFrequency;
		modulatorBeep.frequency.value = carierFrequency;
		modulationLevel.gain.setValueAtTime(0 / (2 * Math.PI * carierFrequency), when);
		modulationLevel.gain.linearRampToValueAtTime(4 / (2 * Math.PI * carierFrequency), when + 1);
		phaseDelay.delayTime.value = 0.5 / carierFrequency;

		modulatorBeep.connect(modulationLevel);
		modulationLevel.connect(phaseDelay.delayTime);
		carrier.connect(phaseDelay);
		phaseDelay.connect(audioContext.destination);

		modulatorBeep.start(when);
		carrier.start(when);

		modulatorBeep.stop(when + 1);
		carrier.stop(when + 1);
	}
</script>

</html>

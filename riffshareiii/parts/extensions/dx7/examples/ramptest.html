<html>
<button onclick='start();'>test</button>
<script>
	function start() {
		let audioContext = new AudioContext();
		let when = audioContext.currentTime + 0.1;
		let carrierFrequency = 1261.6255653005986;
		let duration = 2.7;
		let volAttack = 1;

		let carrier = audioContext.createOscillator();

		let modulationLevel = audioContext.createGain();
		let feedbackLevel = audioContext.createGain();
		let phaseDelay = audioContext.createDelay();
		let delayShift = audioContext.createConstantSource();
		let output = audioContext.createGain();

		carrier.frequency.value = carrierFrequency;
		//output.gain.setValueAtTime(0.5, when);
		output.gain.setValueAtTime(0.0, audioContext.currentTime);
		output.gain.setValueAtTime(0.0, when);
		output.gain.setValueCurveAtTime([0, 0.025, 0.05, 0.2, 0.35, 1], when, 1);
		output.gain.setValueCurveAtTime([1, 0.35, 0.2, 0.05, 0.025, 0], when + 1, 5);
		output.gain.cancelAndHoldAtTime(when + duration);
		output.gain.linearRampToValueAtTime(0,  when + duration + 0.1);


		let feedbackRatio = 1;
		feedbackLevel.gain.setValueAtTime(0.17, when);
		//feedbackLevel.gain.setValueAtTime(feedbackRatio*2.8 / carrierFrequency, when);

		//feedbackLevel.gain.linearRampToValueAtTime(0.2, when + 1);

		modulationLevel.gain.setValueAtTime(2.8 / carrierFrequency, when);
		//delayShift.offset.value = 3 / carrierFrequency;
		delayShift.offset.value = 3 / carrierFrequency;

		//feedbackLevel.connect(phaseDelay.delayTime);
		feedbackLevel.connect(modulationLevel);
		modulationLevel.connect(phaseDelay.delayTime);
		delayShift.connect(phaseDelay.delayTime);
		//carrier.connect(phaseDelay);
		carrier.connect(output);
		phaseDelay.connect(output);

		output.connect(audioContext.destination);
		output.connect(feedbackLevel);

		delayShift.start(when);
		carrier.start(when);

		delayShift.stop(when + 2*duration);
		carrier.stop(when + 2*duration);
	}
</script>

</html>

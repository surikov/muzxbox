<script>
	var cntr = 0;

	function beep(audioContext, plugin) {
		plugin.strum(audioContext.currentTime + 0.1, [66 + cntr], 120, [{
			duration: 1,
			delta: 0
		}]);
		cntr++;
		if (cntr < 10) {
			setTimeout(() => {
				beep(audioContext, plugin);
			}, 500);
		}
	}

	function start() {
		let audioContext = new AudioContext();
		let plugin = newDX7FMSynth1();
		plugin.launch(audioContext, param1);
		//console.log(plugin.busy());
		plugin.output().connect(audioContext.destination);
		beep(audioContext, plugin);


	}
</script>
